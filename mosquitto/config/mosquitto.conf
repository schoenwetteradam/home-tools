listener 1883
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/

log_dest file /mosquitto/log/mosquitto.log

# Anonymous access is fine for a LAN-only broker used by trusted home devices.
# To require a login instead:
#   1. docker exec -it mosquitto mosquitto_passwd -c /mosquitto/config/passwd <username>
#   2. uncomment the two lines below and restart the mosquitto container
# allow_anonymous false
# password_file /mosquitto/config/passwd
allow_anonymous true
